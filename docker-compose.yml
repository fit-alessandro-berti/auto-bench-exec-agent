services:
  auto-bench-exec-agent:
    build:
      context: .
      args:
        GITHUB_USERNAME: ""
        GITHUB_PASSWORD: ""
    ports:
      - "80:80"
      - "443:443"
    cap_add:
      - NET_ADMIN
    environment:
      APP_USERNAME: "admin"
      APP_PASSWORD: "change-this-password"
      FAIL2BAN_ENABLED: "1"
      GITHUB_USERNAME: ""
      GITHUB_PASSWORD: ""
      GIT_COMMIT_USER_NAME: "auto-bench-exec-agent"
      GIT_COMMIT_USER_EMAIL: "auto-bench-exec-agent@users.noreply.github.com"
      OPENROUTER_API_KEY: ""
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ""
      GOOGLE_API_KEY: ""
      GROK_API_KEY: ""
      MISTRAL_API_KEY: ""
      DEEPINFRA_API_KEY: ""
      QWEN_API_KEY: ""
      NVIDIA_API_KEY: ""
      PERPLEXITY_API_KEY: ""
      GROQ_API_KEY: ""
      AUTO_BENCH_MAX_WORKERS: "60"
      AUTO_BENCH_FORCE_CONFIGURED_WORKERS: "1"
    volumes:
      - ./fullchain.pem:/certs/fullchain.pem:ro
      - ./privkey.pem:/certs/privkey.pem:ro
      - ./state:/app/state
      - ./logs:/app/logs
    restart: unless-stopped
